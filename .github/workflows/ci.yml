name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://ci:ci@localhost:5432/plug_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # E2E roda só com E2E_TESTS_ENABLED=true no ambiente (ex. secret + .env no job); sem isso exit 0.
      - name: E2E (optional gate)
        run: npm run test:e2e

      - name: Build
        run: npm run build
